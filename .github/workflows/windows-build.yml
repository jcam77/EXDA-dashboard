name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      build_arm64:
        description: "Build Windows ARM64 (requires self-hosted Windows ARM64 runner)"
        required: false
        default: "false"

jobs:
  build_x64:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: EXDA-dashboard-v0.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: EXDA-dashboard-v0.3/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend build deps
        working-directory: EXDA-dashboard-v0.3/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Build backend exe
        working-directory: EXDA-dashboard-v0.3/backend
        run: |
          python -m PyInstaller --noconfirm --onefile --name exda-backend --add-data "routes;routes" --add-data "modules;modules" app.py

      - name: Install frontend deps
        run: npm ci

      - name: Build demo + Windows installer (x64)
        run: npm run dist:win -- --x64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: EXDA-dashboard-windows-x64
          path: EXDA-dashboard-v0.3/dist-electron/

  build_arm64:
    if: ${{ inputs.build_arm64 == 'true' }}
    runs-on: [self-hosted, windows, arm64]
    defaults:
      run:
        working-directory: EXDA-dashboard-v0.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: EXDA-dashboard-v0.3/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend build deps
        working-directory: EXDA-dashboard-v0.3/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Build backend exe
        working-directory: EXDA-dashboard-v0.3/backend
        run: |
          python -m PyInstaller --noconfirm --onefile --name exda-backend --add-data "routes;routes" --add-data "modules;modules" app.py

      - name: Install frontend deps
        run: npm ci

      - name: Build demo + Windows installer (arm64)
        run: npm run dist:win -- --arm64

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: EXDA-dashboard-windows-arm64
          path: EXDA-dashboard-v0.3/dist-electron/
