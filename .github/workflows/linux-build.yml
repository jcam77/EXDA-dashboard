name: Build Linux App

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            script: dist:linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            script: dist:linux:appimage
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend build deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Build backend app
        working-directory: backend
        run: |
          python -m PyInstaller exda-backend.spec

      - name: Install frontend deps
        run: npm ci

      - name: Build demo + Linux app
        run: npm run ${{ matrix.script }} -- --${{ matrix.arch }} --publish=never

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: EXDA-dashboard-linux-${{ matrix.arch }}
          path: dist-electron/
